name: Deploy to GitHub Pages Branch

on:
  push:
    branches:
      - main  # triggers on every push to main

  workflow_dispatch: # also allows manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Configure git credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local credential.helper "cache --timeout=900"
          cat <<EOF | git credential approve
          url=https://x-access-token:${GITHUB_TOKEN}@github.com
          
          EOF

      - name: Build and deploy to gh-pages branch
        run: npm run deploy

      - name: Cleanup git credentials
        if: always()
        run: |
          if git config --local --get credential.helper > /dev/null; then
            git credential-cache exit
            git config --local --unset credential.helper
          fi